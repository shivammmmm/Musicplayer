name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Web Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Install Capacitor CLI & Platform
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init Shivammm com.shivammm.music --web-dir=dist
          npx cap add android
          npx cap sync

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android App with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shivammm-music-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
